name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.NextAiringEpisode/Jellyfin.Plugin.NextAiringEpisode.csproj

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.NextAiringEpisode/Jellyfin.Plugin.NextAiringEpisode.csproj \
            --configuration Release \
            --no-restore \
            -o ./build

      - name: Package plugin ZIP
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p ./dist
          zip -j ./dist/Jellyfin.Plugin.NextAiringEpisode_${VERSION}.0.zip \
            ./build/Jellyfin.Plugin.NextAiringEpisode.dll

      - name: Update manifest checksum
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ZIPFILE="./dist/Jellyfin.Plugin.NextAiringEpisode_${VERSION}.0.zip"
          CHECKSUM=$(md5sum "$ZIPFILE" | awk '{print $1}')
          sed -i "s/\"checksum\": \"[^\"]*\"/\"checksum\": \"${CHECKSUM}\"/" manifest.json
          echo "Checksum: $CHECKSUM"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*.zip
          body: |
            ## Next Airing Episode ${{ github.ref_name }}

            ### Installation
            Add this repository URL to Jellyfin:
            ```
            https://raw.githubusercontent.com/HolziDape/next-airing-episode/main/manifest.json
            ```
            Then install **Next Airing Episode** from the plugin catalog.

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifest.json
          git diff --staged --quiet || git commit -m "chore: update manifest checksum for ${{ github.ref_name }}"
          git push origin main
